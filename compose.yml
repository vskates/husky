version: '3.8'

networks:
  ros_net:
    driver: bridge

services:
  vv_inf:
    image: vv_inf:latest
    container_name: vv_inf
    hostname: vv_inf
    stdin_open: true
    tty: true

    # Network
    networks:
      - ros_net

    privileged: true

    # Shared memory для PyTorch
    shm_size: '4gb'

    # Environment
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=21
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=0
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # GPU support
    runtime: nvidia

    # Volumes
    volumes:
      # Hardware access
      - /dev:/dev
      # X11 для GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Исходники для разработки
      - ./src/:/root/ros_ws/src/:rw

    # Command для dev режима
    command:
      - bash
      - -c
      - |
        # Source workspace
        source /root/ros_ws/install/setup.bash
        
        # Проверка GPU
        echo "🎮 Checking GPU availability..."
        python3 -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}'); print(f'GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"No GPU\"}')" || true
        
        
        # Keep container running
        tail -f /dev/null

    restart: unless-stopped
